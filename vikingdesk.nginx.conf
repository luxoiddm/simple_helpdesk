# Конфигурация Nginx для VikingDesk
# Файл: /etc/nginx/sites-available/vikingdesk

server {
    listen 80;
    server_name desk.fkviking.com;

    # Перенаправление на HTTPS (раскомментируйте после настройки SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://localhost:3000; # Укажите ваш порт из .env, если он изменен
        proxy_http_version 1.1;
        
        # Настройки для WebSockets (критично для Socket.io)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Передача реальных IP адресов
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для долгоживущих соединений (WebSockets)
        proxy_read_timeout 86400;
    }
}

